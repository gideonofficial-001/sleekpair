services:
  - type: web
    name: sleek-md-pairer
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/sessions
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    # Uncomment for persistent sessions (requires paid plan $7+/mo):
    # disk:
    #   name: sessions
    #   mountPath: /opt/render/project/src/sessions
    #   sizeGB: 1