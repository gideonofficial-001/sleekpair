<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SLEEK MD Pair Generator – Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>SLEEK MD – Pair Generator (Backend Test)</h2>

<p>
  <b>Phone number</b> (international format, digits only):
</p>
<input id="phone" placeholder="254712345678">

<p>
  <b>Token</b>:
</p>
<input id="token" type="password" placeholder="Enter secret token">

<br><br>
<button onclick="generate()">Generate Pair Code</button>

<p id="status"></p>

<hr>

<h3>Generated Pair Code</h3>
<p id="pairCode" style="font-size:20px;font-weight:bold;"></p>
<button onclick="copyCode()">Copy Pair Code</button>

<script>
async function generate() {
  const phone = document.getElementById("phone").value.trim();
  const token = document.getElementById("token").value.trim();
  const status = document.getElementById("status");
  const output = document.getElementById("pairCode");

  output.innerText = "";
  status.innerText = "Generating...";

  if (!/^[1-9][0-9]{9,14}$/.test(phone)) {
    status.innerText = "❌ Invalid phone number format";
    return;
  }

  if (!token) {
    status.innerText = "❌ Token required";
    return;
  }

  try {
    const res = await fetch(
      `/api/pair-code?phone=${phone}&token=${token}`
    );
    const data = await res.json();

    if (data.error) {
      status.innerText = "❌ " + data.error;
      return;
    }

    output.innerText = data.pairCode;
    status.innerText = "✅ Pair code generated successfully";

  } catch (e) {
    status.innerText = "❌ Server error";
  }
}

function copyCode() {
  const code = document.getElementById("pairCode").innerText;
  if (!code) {
    alert("No pair code to copy");
    return;
  }
  navigator.clipboard.writeText(code);
  alert("Pair code copied to clipboard");
}
</script>

</body>
</html>
